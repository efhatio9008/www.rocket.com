      box-sizing: border-box;
    }

    body {
      margin: 0;

      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 700px;
      text-align: center;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      padding: 24px 18px 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);

    }

  #myVideo {
  width: 320px;        /* 👈 固定宽度（关键） */
  max-width: 90%;      
  height: auto;
  object-fit: contain;
  display: block;
  margin: 0 auto;
  max-height: 280px
}

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .subtext {
      margin: 0 0 20px;
      font-size: 14px;
      color: rgba(255,255,255,0.8);
    }

    .wheel-wrap {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 0 auto 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pointer {
      display: none;
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      border: 8px solid rgba(255,255,255,0.95);
      box-shadow:
        0 10px 25px rgba(0,0,0,0.3),
        inset 0 0 20px rgba(255,255,255,0.25);
      transition: transform 4s cubic-bezier(0.15, 0.85, 0.18, 1);
      background: #fff;
      position: relative;
    }

    .wheel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .center-dot {
      display: none;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 26px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
      min-width: 180px;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .spin-btn {
      background: linear-gradient(135deg, #ff6b81, #ff416c);
      color: white;
      box-shadow: 0 8px 20px rgba(255, 65, 108, 0.35);
    }

    .music-btn {
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
    }

    .tip {
      margin-top: 14px;
      font-size: 13px;
      color: rgba(255,255,255,0.72);
      line-height: 1.5;
    }

    /* 弹出大图 */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.25s ease, visibility 0.25s ease;
      z-index: 999;
    }

    .modal.show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .modal-card {
      position: relative;
      width: min(92vw, 480px);
      max-height: 88vh;
      border-radius: 0;
      overflow: hidden;
      background: #111;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      transform: scale(0.82);
      transition: transform 0.28s ease;
    }

    .modal.show .modal-card {
      transform: scale(1);
    }

    .modal-card img {
    width: 100%;
    height: auto;
    max-height: 70vh; /* 👈 关键：从88改成70 */
    object-fit: contain;
    display: block;
    background: #111;
    }

    .love-text {

    color: #fff;
    text-align: center;
   line-height: 1.6;

    }

    .close-btn {

  max-width: 560px;
}

    .petals {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}

.petals span {
  position: absolute;
  top: -10px;
  width: 12px;
  height: 12px;
  background: pink;
  border-radius: 50% 50% 50% 0;
  opacity: 0.7;
  animation: fall linear infinite;
}

@keyframes fall {
  0% {
    transform: translateY(0) translateX(0) rotate(0deg);
  }
  100% {
    transform: translateY(100vh) translateX(50px) rotate(360deg);
  }
}

/* ===== 隐藏奖励 ===== */
    .secret-reward {
      position: fixed;
      inset: 0;
      background: rgba(8, 6, 20, 0.82);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.35s ease, visibility 0.35s ease;
      z-index: 2000;
      overflow: hidden;
    }

    .secret-reward.show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .reward-message {

      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
      backdrop-filter: blur(8px);
    }

    .rocket {
      position: absolute;
      bottom: -140px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 90px;
      z-index: 3;
      opacity: 0;
    }

    .secret-reward.show .rocket {
      animation: rocketFly 2.8s ease-out forwards;
    }

    @keyframes rocketFly {
      0% {
        transform: translateX(-50%) translateY(0) scale(0.8) rotate(-8deg);
        opacity: 0;
      }
      12% {
        opacity: 1;
      }
      100% {
        transform: translateX(-50%) translateY(-95vh) scale(1.15) rotate(8deg);
        opacity: 0;
      }
    }

    .fireworks {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 2;
      pointer-events: none;
    }

    .firework {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      opacity: 0;
      box-shadow:
        0 -45px 0 #ff4d6d,
        32px -32px 0 #ffd166,
        45px 0 0 #06d6a0,
        32px 32px 0 #4cc9f0,
        0 45px 0 #f72585,
        -32px 32px 0 #ffe066,
        -45px 0 0 #90be6d,
        -32px -32px 0 #9b5de5;
      animation: burst 1.2s ease-out forwards;
    }

    @keyframes burst {
      0% {
        transform: scale(0.2);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: scale(1.35);

      }

/* 中间宝石 */
.ring::after {

    function playDing() {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContextClass();

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "triangle";
        osc.frequency.setValueAtTime(1200, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.18);

        gain.gain.setValueAtTime(0.001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.22, ctx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start();
        osc.stop(ctx.currentTime + 0.22);
      } catch (e) {
        console.log("Ding 音效播放失败", e);
      }
    }

let currentUser = null;

const users = {
  kiki: { name: "Kiki", password: "2299" },

};

function selectUser(user){
  currentUser = user;
  document.getElementById("password").value = "";
  document.getElementById("passwordBox").style.display = "block";

function loginUser(){
  const pwd = document.getElementById('password').value;

  if(pwd === users[currentUser].password){
    document.getElementById('login').style.display = "none";
    document.getElementById('chat').style.display = "block";
    document.getElementById('userTitle').innerText = users[currentUser].name;
    loadMessages();

  setInterval(loadMessages, 2000);

  }else{
    alert("密码错误");
  }
}

function loadMessages(){
  fetch("https://www-rocket-com.onrender.com/messages")
    .then(res => res.json())
    .then(messages => {
      const now = Date.now();

      if (messages.length > 0) {
        const startTime = messages[0].created_at;
        if (now - startTime > 86400000) {
          fetch("https://www-rocket-com.onrender.com/messages", {
            method: "DELETE"
          }).then(() => {
            render([]);
          });
          return;
        }
      }

      render(messages);
    })
    .catch(err => {
      console.log("读取消息失败:", err);
    });
}

function render(messages){
  const box = document.getElementById("chatBox");
  box.innerHTML = "";

  messages.forEach(m=>{
    const div = document.createElement("div");
   div.innerText = (m.user === currentUser ? "我: " : "对方: ") + m.text;
    box.appendChild(div);
  });
}

function sendMessage(){
  const input = document.getElementById("messageInput");
  const text = input.value.trim();
  if(!text) return;

  if(text.length > 40){
    alert("超过40字");
    return;
  }

  fetch("https://www-rocket-com.onrender.com/messages")
    .then(res => res.json())
    .then(messages => {
      const now = Date.now();

      if (messages.length > 0) {
        const startTime = messages[0].created_at;

        if (now - startTime > 86400000) {
          return fetch("https://www-rocket-com.onrender.com/messages", {
            method: "DELETE"
          }).then(() => []);
        }
      }

      return messages;
    })
    .then(messages => {
      const now = Date.now();

      if(messages.length >= 20){
        const lockTime = messages[19].created_at;

        if(now - lockTime < 86400000){
          alert("已达20条，等24小时");
          return;
        } else {
          return fetch("https://www-rocket-com.onrender.com/messages", {
            method: "DELETE"
          }).then(() => []);
        }
      }

      return fetch("https://www-rocket-com.onrender.com/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          user: currentUser,
          text: text,
          created_at: now
        })
      });
    })
    .then(() => {
      input.value = "";
      loadMessages();
    })
    .catch(err => {
      console.log("发送失败:", err);
    });
}

function randomItem(arr) {

function typeLine(text, delay = 35) {
  return new Promise(resolve => {
    let i = 0;
    const line = document.createElement("div");
    cmdText.appendChild(line);

    const timer = setInterval(() => {
      line.textContent += text[i];
      i++;
      cmdBox.scrollTop = cmdBox.scrollHeight;

      if (i >= text.length) {
        clearInterval(timer);
        resolve();
      }
    }, delay);
  });
}
